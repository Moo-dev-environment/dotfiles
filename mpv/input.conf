# input.conf — custom keybindings
# Full default binding list:  mpv --input-keylist  /  https://mpv.io/manual/stable/#interactive-control
# Syntax:  KEY  command  [args]
# Anything not listed here keeps mpv's built-in default binding.

###########################################################################
# Playback speed — additive 0.25x steps
# (overrides mpv's defaults, which change speed by ±10% multiplicatively)
###########################################################################
[       add speed -0.25      # slow down by 0.25x
]       add speed  0.25      # speed up by 0.25x
BS      set speed  1.0       # Backspace → reset to normal (1.0x) speed

# Pitch is kept natural while the speed changes because of
# `audio-pitch-correction=yes` in mpv.conf, so voices don't go chipmunk/demon.
