# mpv.conf — main configuration
# Tuned for high-quality playback on Linux/Wayland (Omarchy/Hyprland), mpv 0.41+.
# Reference for every option: https://mpv.io/manual/stable/#options
# Keybindings live in input.conf (next to this file).

###########################################################################
# Video output & decoding
###########################################################################
vo=gpu-next            # modern GPU video output (successor to "gpu"); best quality/features
gpu-api=auto           # let mpv pick Vulkan/OpenGL as available
hwdec=auto-safe        # hardware decoding when it's known-safe; falls back to software otherwise

###########################################################################
# High-quality scaling & rendering
# (these are what "make video look good"; safe on any modern GPU with gpu-next)
###########################################################################
scale=ewa_lanczossharp     # upscaling filter — sharp, high quality
cscale=ewa_lanczossharp    # chroma (colour) upscaling
dscale=mitchell            # downscaling filter — clean shrink, no ringing
correct-downscaling=yes    # average all source pixels when shrinking (less aliasing)
linear-downscaling=yes     # downscale in linear light (correct brightness)
sigmoid-upscaling=yes      # reduce ringing/haloing when upscaling
deband=yes                 # smooth out colour banding in gradients (skies, fades)
dither-depth=auto          # dither to the display's bit depth to avoid banding

###########################################################################
# Audio
###########################################################################
volume=100                 # startup volume (%)
volume-max=150             # allow boosting above 100% (up to 150)
audio-pitch-correction=yes # keep pitch natural when changing playback speed (great with [ ])
audio-file-auto=fuzzy      # auto-load external audio tracks with similar names
alang=en,eng               # preferred audio languages, in order

###########################################################################
# Subtitles
###########################################################################
sub-auto=fuzzy             # auto-load external subs even if the filename isn't an exact match
slang=en,eng               # preferred subtitle languages
sub-font-size=40           # readable default size
sub-color='#FFFFFFFF'      # white text (ARGB)
sub-border-size=2.5        # outline thickness for readability over any background
sub-border-color='#FF000000'  # black outline
sub-shadow-offset=1        # subtle drop shadow

###########################################################################
# Screenshots
###########################################################################
screenshot-format=png            # lossless
screenshot-png-compression=7     # good size/speed balance
screenshot-high-bit-depth=yes    # capture full bit depth
screenshot-directory=~/Pictures/mpv
screenshot-template='%F-%P-%n'   # <filename>-<position>-<counter>

###########################################################################
# On-screen UI
###########################################################################
osc=yes                    # the on-screen controller (mouse-over playback bar)
osd-bar=yes                # the volume/seek bar overlay
osd-font-size=32
border=no                  # no window title bar (tiling WM draws its own chrome)
cursor-autohide=1000       # hide the mouse cursor after 1s of no movement

###########################################################################
# Playback behaviour
###########################################################################
keep-open=yes              # don't close the window when a file ends — pause on the last frame
save-position-on-quit=yes  # resume where you left off next time you open the same file
force-seekable=yes         # allow seeking even in streams that claim to be unseekable

###########################################################################
# Window sizing (Wayland)
###########################################################################
autofit-larger=90%x90%     # never open bigger than 90% of the screen
geometry=50%:50%           # center the window on launch

###########################################################################
# Cache / network streaming
###########################################################################
cache=yes
demuxer-max-bytes=150MiB         # how much to buffer ahead (forward cache)
demuxer-max-back-bytes=50MiB     # keep some behind, so short back-seeks are instant
demuxer-readahead-secs=20        # read ~20s ahead

# Streaming sites via yt-dlp: cap quality at 1080p, best matching audio.
# Drop "[height<=?1080]" if you want the absolute best the source offers.
ytdl-format=bestvideo[height<=?1080]+bestaudio/best
