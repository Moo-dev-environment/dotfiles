# Tokyo Night Storm — folke/tokyonight.nvim "storm" variant.
# Matches the in-pane theme used by nvim, tmux, starship, and bat.

[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[colors.normal]
black   = "#1d202f"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[colors.vi_mode_cursor]
text   = "#1a1b26"
cursor = "#bb9af7"

[colors.selection]
text       = "#c0caf5"
background = "#33467c"

[colors.search.matches]
foreground = "#1a1b26"
background = "#7dcfff"

[colors.search.focused_match]
foreground = "#1a1b26"
background = "#9ece6a"

[colors.footer_bar]
foreground = "#c0caf5"
background = "#1d202f"

[colors.hints.start]
foreground = "#1a1b26"
background = "#e0af68"

[colors.hints.end]
foreground = "#1a1b26"
background = "#7dcfff"
